version: '3.9'
services:
    #PHP Service
    events-api-fpm:
        image: events-api
        platform: linux/x86_64
        build:
            context: ..
            dockerfile: .docker/Dockerfile
        container_name: events-api-fpm
        volumes:
            - ..:/srv/events-api
            - /srv/events-api/bootstrap/cache
            - /srv/events-api/storage/framework
        networks:
            - project_network

    #Nginx Service
    events-api:
        depends_on:
            - events-api-fpm
        restart: unless-stopped
        ports:
            - "8080:80"
        image: nginx:stable-alpine
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf:ro
            - ..:/srv/events-api
        container_name: events-api-nginx
        hostname: events-api
        environment:
            - SERVER_NAME=events-api.loc
            - FPM_SERVICE_NAME=events-api-fpm
            - VIRTUAL_HOST=events-api.loc
        networks:
            - project_network

#Docker Networks
networks:
    project_network:
        name: project_net
        external: true
